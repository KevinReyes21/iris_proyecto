<!DOCTYPE html>
<html lang="es">

<head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Exo+2:wght@200;300;400;500;600&display=swap" rel="stylesheet">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>IRISVIEW - Propiedad</title>

  <link rel="stylesheet" href="/irisview/css/propiedad.css">
</head>

<body>

<section class="hero-propiedad">

  <!-- VIDEO -->
  <video class="hero-video" autoplay muted loop playsinline>
    <source src="" type="video/mp4">
  </video>

  <!-- OVERLAY -->
  <div class="hero-overlay"></div>

  <!-- CONTENIDO -->
  <div class="hero-propiedad-content reveal">

    <div class="hero-tag">
      PROPIEDAD DESTACADA
    </div>

    <h1 id="titulo">Cargando propiedad...</h1>

    <p class="hero-sub" id="descripcion"></p>

    <p class="hero-price" id="precio"></p>

    <div class="hero-buttons">
      <a id="btn-whatsapp" class="btn-primary">WhatsApp</a>
      <a id="btn-visita" class="btn-primary">Agendar visita</a>
    </div>

  </div>

  <!-- SCROLL HINT -->
  <div class="hero-scroll-hint">
    <div class="scroll-line"></div>
    DESLIZA
  </div>

</section>

<!-- =========================
      JS
========================= -->
<script src="/irisview/js/propiedad.js"></script>

</body>

</html>
